  <!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CEDIPO - User Login</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          "DM Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #2e7d32;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        overflow: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          linear-gradient(rgba(46, 125, 50, 0.7), rgba(46, 125, 50, 0.7)),
          url("../tagbilaran.jpg");
        background-size: cover;
        background-position: center;
        filter: blur(0.5px);
        transform: scale(1.1); /* Prevents white edges caused by blur */
        z-index: -1;
      }
      .container {
        background: white;
        border-radius: 12px;
        padding: 40px;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      .logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin-bottom: 30px;
      }
      .logo img {
        height: 50px;
        width: auto;
      }
      .logo-text {
        text-align: left;
      }
      .logo h1 {
        font-size: 24px;
        color: #333;
        margin-bottom: 2px;
        line-height: 1.2;
      }
      .logo p {
        font-size: 12px;
        color: #888;
      }
      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
        border-bottom: 2px solid #f0f0f0;
      }
      .tab-btn {
        flex: 1;
        padding: 12px;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        color: #999;
        border-bottom: 3px solid transparent;
        transition: all 0.3s;
      }
      .tab-btn.active {
        color: #4caf50;
        border-bottom-color: #4caf50;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        padding: 12px;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
        transition: all 0.3s;
      }
      input:focus {
        outline: none;
        border-color: #4caf50;
        box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
      }
      button {
        width: 100%;
        padding: 12px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }
      button:hover {
        background: #388e3c;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
      }
      .error {
        background: #fee;
        border: 1px solid #fcc;
        color: #c33;
        padding: 12px;
        border-radius: 6px;
        font-size: 13px;
        margin-bottom: 20px;
        display: none;
      }
      .error.show {
        display: block;
      }
      .info {
        background: #f0f4ff;
        border: 1px solid #d0deff;
        color: #4a5a7f;
        padding: 12px;
        border-radius: 6px;
        font-size: 12px;
        margin-bottom: 20px;
        line-height: 1.6;
      }
      .passkey-container {
        position: relative;
      }
      .passkey-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: auto !important;
        background: none !important;
        padding: 0 !important;
        color: #999 !important;
        box-shadow: none !important;
      }
      .passkey-toggle:hover {
        color: #4caf50 !important;
        transform: translateY(-50%) !important;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <img src="../cedipo.png" alt="CEDIPO logo" />
        <div class="logo-text">
          <h1>CEDIPO Registry</h1>
          <p>Tagbilaran City MSME</p>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('user')">
          User Access
        </button>
        <button class="tab-btn" onclick="switchTab('admin')">Admin</button>
      </div>

      <!-- USER TAB -->
      <div id="user-tab" class="tab-content active">
        <div class="error" id="user-error"></div>
        <form id="userForm">
          <div class="form-group">
            <label for="passkey">Passkey</label>
            <div class="passkey-container">
              <input
                type="password"
                id="passkey"
                name="passkey"
                placeholder="Enter passkey"
                style="padding-right: 40px"
                required
              />
              <button
                type="button"
                class="passkey-toggle"
                onclick="togglePasskey()"
              >
                <i id="toggleIcon" class="ti ti-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit">Access Registry</button>
        </form>
      </div>

      <!-- ADMIN TAB -->
      <div id="admin-tab" class="tab-content">
        <div class="error" id="admin-error"></div>
        <form id="adminForm">
          <div class="form-group">
            <label for="admin-username">Username</label>
            <input
              type="text"
              id="admin-username"
              name="username"
              placeholder="Enter username"
              required
            />
          </div>
          <div class="form-group">
            <label for="admin-password">Password</label>
            <div class="passkey-container">
              <input
                type="password"
                id="admin-password"
                name="password"
                placeholder="Enter password"
                style="padding-right: 40px"
                required
              />
              <button
                type="button"
                class="passkey-toggle"
                onclick="toggleAdminPassword()"
              >
                <i id="toggleAdminIcon" class="ti ti-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit">Login to Admin</button>
        </form>
      </div>
    </div>

    <!-- Load Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Load Supabase client initialization -->
    <script src="../supabaseClient.js"></script>
    <script>
      function showMessageDialog(message, title = "Error") {
        const backdrop = document.createElement("div");
        backdrop.style.cssText =
          "position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); display: flex; align-items: center; justify-content: center; z-index: 10000;";

        const modal = document.createElement("div");
        modal.style.cssText =
          "background: white; border-radius: 16px; padding: 40px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); max-width: 520px; text-align: center;";

        const titleEl = document.createElement("h2");
        titleEl.textContent = title;
        titleEl.style.cssText =
          "margin: 0 0 16px 0; font-size: 26px; color: #dc2626; font-weight: 700;";
        modal.appendChild(titleEl);

        const msg = document.createElement("p");
        msg.textContent = message;
        msg.style.cssText =
          "margin: 0 0 32px 0; font-size: 16px; color: #555; line-height: 1.6;";
        modal.appendChild(msg);

        const btnContainer = document.createElement("div");
        btnContainer.style.cssText =
          "display: flex; gap: 12px; justify-content: center;";

        const okBtn = document.createElement("button");
        okBtn.textContent = "OK";
        okBtn.style.cssText =
          "padding: 12px 32px; border-radius: 8px; border: none; background: #4caf50; color: white; cursor: pointer; font-size: 16px; font-weight: 600; transition: background 0.3s;";
        okBtn.onmouseover = () => (okBtn.style.background = "#45a049");
        okBtn.onmouseout = () => (okBtn.style.background = "#4caf50");
        okBtn.onclick = () => {
          backdrop.remove();
        };
        btnContainer.appendChild(okBtn);

        modal.appendChild(btnContainer);
        backdrop.appendChild(modal);
        document.body.appendChild(backdrop);
      }

      function togglePasskey() {
        const input = document.getElementById("passkey");
        const icon = document.getElementById("toggleIcon");
        if (input.type === "password") {
          input.type = "text";
          icon.classList.replace("ti-eye", "ti-eye-off");
        } else {
          input.type = "password";
          icon.classList.replace("ti-eye-off", "ti-eye");
        }
      }

      function toggleAdminPassword() {
        const input = document.getElementById("admin-password");
        const icon = document.getElementById("toggleAdminIcon");
        if (input.type === "password") {
          input.type = "text";
          icon.classList.replace("ti-eye", "ti-eye-off");
        } else {
          input.type = "password";
          icon.classList.replace("ti-eye-off", "ti-eye");
        }
      }

      function switchTab(tab) {
        document
          .querySelectorAll(".tab-content")
          .forEach((el) => el.classList.remove("active"));
        document
          .querySelectorAll(".tab-btn")
          .forEach((el) => el.classList.remove("active"));

        document.getElementById(tab + "-tab").classList.add("active");
        event.target.classList.add("active");
      }

      // User login handler
      document
        .getElementById("userForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          const passkey = document.getElementById("passkey").value;

          const { data, error } = await supabase
            .from("passkeys")
            .select("name")
            .eq("name", passkey)
            .single();

          if (data) {
            localStorage.setItem("user_passkey", passkey);
            window.location.href = "../user.html";
          } else {
            showMessageDialog(
              "Invalid passkey. Please try again.",
              "Login Failed",
            );
          }
        });

      // Admin login handler
      document
        .getElementById("adminForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const username = document.getElementById("admin-username").value;
          const password = document.getElementById("admin-password").value;

          if (username === "cedipotagbilaran" && password === "cedipo2026") {
            localStorage.setItem("is_admin", "true");
            localStorage.setItem("admin_user", username);
            window.location.href = "admin.html";
          } else {
            showMessageDialog(
              "Invalid username or password. Please try again.",
              "Login Failed",
            );
          }
        });

      // Expose to window
      window.togglePasskey = togglePasskey;
      window.switchTab = switchTab;
    </script>
  </body>
</html>
